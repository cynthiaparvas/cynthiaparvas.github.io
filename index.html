<!--This is actually a lyrics machine thing for a Belgian band called dEUS, not a "quotes" machine; nevertheless, I have kept the id attributes of my HTML elements somehow irrevelant, just for the FCC tests to pass. -->
<div id="wrapper">
  <div id="quote-box">
    <div class="quote-text"> <i class="fa fa-music"> </i><span id="text"></span> </div>
    <div class="quote-author">- <span id="author"></span></div>
    <div class="buttons"> <a href="twitter.com/intent/tweet" class="button" id="tweet-quote" title="Tweet this lyric?" target="_blank"> <i class="fa fa-twitter"></i> </a> <button class="button" id="new-quote" title="Generate new lyrics">New Lyric</button> </div>

  </div>
  <div class="footer">check out <a target="_blank" href="https://open.spotify.com/artist/3zMir00BoCKhwNTjlT61KN"> dEUS' music!</a></div>
</div>
